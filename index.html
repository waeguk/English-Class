<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Meeting Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-6 space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-gray-800">English Meeting Survey 🇬🇧</h1>
            <p class="text-sm text-gray-500 mt-1">의견을 제출하시면 실시간 결과가 반영됩니다.</p>
        </div>

        <hr class="border-gray-200">

        <form id="surveyForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">닉네임 (Alias Name)</label>
                <input type="text" id="alias" required placeholder="닉네임을 입력하세요" 
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">1. 어떤 레벨의 모임을 원하시나요?</label>
                <div class="space-y-2">
                    <label class="flex items-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition">
                        <input type="radio" name="q1" value="초급" required class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                        <span class="ml-3 text-gray-700">초급</span>
                    </label>
                    <label class="flex items-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition">
                        <input type="radio" name="q1" value="고급" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                        <span class="ml-3 text-gray-700">고급</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">2. 수업 일정은 어떤 방식이 좋으신가요?</label>
                <div class="space-y-2">
                    <label class="flex items-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition">
                        <input type="radio" name="q2" value="고정" required class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                        <span class="ml-3 text-gray-700">매주 같은 요일과 시간으로 진행</span>
                    </label>
                    <label class="flex items-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition">
                        <input type="radio" name="q2" value="유동" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                        <span class="ml-3 text-gray-700">매주 일요일에 다음 주 일정 결정</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition shadow-md hover:shadow-lg">
                투표 제출하기 (Submit)
            </button>
        </form>

        <hr class="border-gray-200">

        <div class="space-y-5">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">📊 실시간 투표 결과</h2>
                <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-1 rounded-full">
                    총 참여자: <span id="totalCount">0</span>명
                </span>
            </div>

            <div class="space-y-3">
                <p class="text-sm font-medium text-gray-600">Q1. 선호 레벨</p>
                <div>
                    <div class="flex justify-between text-sm mb-1">
                        <span class="text-gray-700">초급</span>
                        <span class="font-semibold text-gray-800" id="q1_option1_text">0명 (0%)</span>
                    </div>
                    <div class="w-full bg-gray-200 h-2.5 rounded-full overflow-hidden">
                        <div id="q1_option1_bar" class="bg-blue-500 h-2.5 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-sm mb-1">
                        <span class="text-gray-700">고급</span>
                        <span class="font-semibold text-gray-800" id="q1_option2_text">0명 (0%)</span>
                    </div>
                    <div class="w-full bg-gray-200 h-2.5 rounded-full overflow-hidden">
                        <div id="q1_option2_bar" class="bg-indigo-500 h-2.5 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="space-y-3 pt-2">
                <p class="text-sm font-medium text-gray-600">Q2. 선호 일정</p>
                <div>
                    <div class="flex justify-between text-sm mb-1">
                        <span class="text-gray-700">고정 일정</span>
                        <span class="font-semibold text-gray-800" id="q2_option1_text">0명 (0%)</span>
                    </div>
                    <div class="w-full bg-gray-200 h-2.5 rounded-full overflow-hidden">
                        <div id="q2_option1_bar" class="bg-emerald-500 h-2.5 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-sm mb-1">
                        <span class="text-gray-700">매주 결정</span>
                        <span class="font-semibold text-gray-800" id="q2_option2_text">0명 (0%)</span>
                    </div>
                    <div class="w-full bg-gray-200 h-2.5 rounded-full overflow-hidden">
                        <div id="q2_option2_bar" class="bg-teal-500 h-2.5 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <details class="group bg-gray-50 rounded-xl p-3 border border-gray-100 mt-4 cursor-pointer">
                <summary class="list-none flex justify-between items-center font-medium text-sm text-gray-600">
                    <span>👥 참여자 명단 (Alias List)</span>
                    <span class="transition group-open:rotate-180">👇</span>
                </summary>
                <div id="participantList" class="text-xs text-gray-500 mt-2 grid grid-cols-2 gap-1 pt-2 border-t border-gray-200">
                    </div>
            </details>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ⚠️ PASTE YOUR FIREBASE CONFIG HERE ⚠️
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const votesRef = ref(db, 'votes');

        // Form Submit Handler
        document.getElementById('surveyForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const alias = document.getElementById('alias').value.trim();
            const q1 = document.querySelector('input[name="q1"]:checked').value;
            const q2 = document.querySelector('input[name="q2"]:checked').value;

            if(alias) {
                push(votesRef, { alias, q1, q2, timestamp: Date.now() })
                .then(() => {
                    alert('투표가 성공적으로 제출되었습니다! 🎉');
                    document.getElementById('surveyForm').reset();
                })
                .catch((error) => alert('에러 발생: ' + error.message));
            }
        });

        // Realtime Data Listener
        onValue(votesRef, (snapshot) => {
            const data = snapshot.val();
            
            let total = 0;
            let q1_counts = { "초급": 0, "고급": 0 };
            let q2_counts = { "고정": 0, "유동": 0 };
            let participants = [];

            if (data) {
                Object.values(data).forEach(vote => {
                    total++;
                    if (q1_counts[vote.q1] !== undefined) q1_counts[vote.q1]++;
                    if (q2_counts[vote.q2] !== undefined) q2_counts[vote.q2]++;
                    participants.push(vote.alias);
                });
            }

            // Update DOM Total
            document.getElementById('totalCount').innerText = total;

            // Helper function to calculate percentage and updates bars/text
            const updateUI = (count, total, textId, barId) => {
                const percent = total > 0 ? Math.round((count / total) * 100) : 0;
                document.getElementById(textId).innerText = `${count}명 (${percent}%)`;
                document.getElementById(barId).style.width = `${percent}%`;
            };

            // Update Q1
            updateUI(q1_counts["초급"], total, 'q1_option1_text', 'q1_option1_bar');
            updateUI(q1_counts["고급"], total, 'q1_option2_text', 'q1_option2_bar');

            // Update Q2
            updateUI(q2_counts["고정"], total, 'q2_option1_text', 'q2_option1_bar');
            updateUI(q2_counts["유동"], total, 'q2_option2_text', 'q2_option2_bar');

            // Update Participant List
            const listEl = document.getElementById('participantList');
            if(participants.length > 0) {
                listEl.innerHTML = participants.map(p => `<span class="bg-gray-100 p-1 px-2 rounded border border-gray-200 truncate">👤 ${p}</span>`).join('');
            } else {
                listEl.innerHTML = '<span class="text-gray-400 col-span-2 text-center py-2">아직 참여자가 없습니다.</span>';
            }
        });
    </script>
</body>
</html>
